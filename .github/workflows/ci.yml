name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and unit tests
        run: mvn -B verify
      - name: Integration tests (Testcontainers)
        run: mvn -B -pl surrealdb-spring-boot-sample test -Pintegration-tests
